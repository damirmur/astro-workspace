<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT & Astro Workspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="pocketbase.umd.js"></script>
</head>
<body>

    <!-- ОКНО АВТОРИЗАЦИИ (Блокирует экран до входа) -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <h2>🔑 Вход в систему</h2>
            <p style="font-size:12px; color:#94a3b8; margin-bottom:15px;">Введите данные учетной записи живого сотрудника или ИИ-агента</p>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="login-email" required placeholder="worker@test.ru">
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="login-password" required placeholder="••••••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Войти</button>
            </form>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ -->
    <div id="main-workspace" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1>💻 Мультипроектное пространство разработки</h1>
            <!-- Информация о текущей сессии -->
            <div class="user-badge">
                👤 <span id="user-display-name">Загрузка...</span> 
                (<span id="user-display-role" style="color:#38bdf8;">role</span>)
                <button class="btn-logout" onclick="handleLogout()">Выйти 🚪</button>
            </div>
        </div>

        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ ПРОЕКТАМИ -->
        <div class="project-panel">
            <div>
                <label style="display:block; font-size:12px; color:#94a3b8; margin-bottom:4px;">Текущий проект:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="project-selector" onchange="selectProject()"></select>
                    <button class="btn btn-subtask" style="padding: 8px 12px;" onclick="exportCurrentProject()">📥 Экспорт</button>
                    <button class="btn btn-subtask" style="padding: 8px 12px;" onclick="document.getElementById('import-file-input').click()">📤 Импорт</button>
                    <input type="file" id="import-file-input" accept=".json" style="display: none;" onchange="importProjectFile(event)">
                </div>
            </div>
            <div style="margin-left: auto; display: flex; gap: 10px; align-items: flex-end;">
                <div>
                    <label style="display:block; font-size:12px; color:#94a3b8; margin-bottom:4px;">Новый проект:</label>
                    <input type="text" id="new-project-title" placeholder="Например: Разработка на Go">
                </div>
                <button class="btn btn-success" onclick="createNewProject()">+ Создать проект</button>
            </div>
        </div>
        <!-- ПАНЕЛЬ ИНТЕРАКТИВНЫХ ФИЛЬТРОВ -->
        <div class="filters-panel" style="background: #1e293b; border: 1px solid #334155; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; font-size: 14px;">
            <span style="color: #94a3b8; font-weight: bold;">🔍 Фильтры бэклога:</span>
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="filter-hide-done" onchange="applyFilters()"> Скрыть выполненные (Done / Canceled)
            </label>
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="filter-only-critical" onchange="applyFilters()"> 🔥 Только Критические баги
            </label>
            <!-- Ссылка на GitHub проекта, будет заполняться динамически -->
            <a id="project-github-link" href="#" target="_blank" style="margin-left: auto; color: #38bdf8; text-decoration: none; display: none; align-items: center; gap: 6px;">📦 GitHub Репозиторий →</a>
        </div>

        <!-- ДЕРЕВО ЗАДАЧ ТЕКУЩЕГО ПРОЕКТА -->
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h2 id="current-project-name" style="color: #38bdf8; margin: 0;">Загрузка...</h2>
            <button id="root-task-btn" class="btn btn-primary" style="display:none;" onclick="createSubtask(event, '')">+ Корневой Эпик</button>
        </div>
        
        <div id="workspace-tree">Загрузка дерева задач...</div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="engine.js"></script>
        <!-- Новая разделенная UI-система -->
    <script src="ui-render.js"></script>
    <script src="ui-actions.js"></script>
    <script src="ui-auth.js"></script>
</body>
</html>
